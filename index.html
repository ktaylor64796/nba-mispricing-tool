<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Value Index | Action Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060c;
            --panel: #11141d;
            --accent: #42f5c5; /* Action Green */
            --text: #e9f4f1;
            --border: rgba(255,255,255,0.1);
            --overrated: #ff4d4d;
        }

        body {
            background: radial-gradient(circle at top right, #103f3a, transparent), var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
            min-height: 100vh;
        }

        .wrapper { max-width: 900px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; }
        .logo { font-weight: 900; letter-spacing: 2px; color: #666; margin-bottom: 5px; }
        .logo span { color: var(--accent); }
        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -1px; }
        h1 span { color: var(--accent); }

        .mission-statement {
            color: #888;
            font-size: 1rem;
            max-width: 700px;
            margin: 15px auto 0;
            font-weight: 400;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: #0b0f19;
            border: 1px solid var(--border);
            padding: 16px;
            color: white;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(66, 245, 197, 0.2); }

        .suggestion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .mini-card {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .mini-card:hover { border-color: var(--accent); background: rgba(66, 245, 197, 0.05); transform: translateY(-3px); }
        .mini-avatar img { width: 55px; height: 55px; border-radius: 50%; background: #222; object-fit: cover; }
        .mini-name { font-size: 0.8rem; font-weight: 700; margin-top: 8px; color: #ccc; }

        /* Main Display */
        #main-display { display: none; border-left: 4px solid var(--accent); }
        .action-card { overflow: hidden; position: relative; }
        .card-header { height: 100px; position: relative; margin-bottom: 60px; border-radius: 12px; }
        .main-photo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 6px solid var(--panel);
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1e2e;
        }
        .card-body { text-align: center; padding: 0 10px 20px; }
        
        /* Value Meter Styles */
        .value-meter { margin: 20px 0; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .meter-row { margin-bottom: 10px; text-align: left; }
        .meter-label { font-size: 0.65rem; font-weight: 900; color: #888; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        .bar-container { background: #222; height: 8px; border-radius: 4px; width: 100%; position: relative; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-out; }
        
        .stats-row { display: flex; justify-content: center; gap: 40px; margin: 25px 0; }
        .stat small { display: block; color: #666; font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; }
        .stat div { font-size: 1.6rem; font-weight: 900; }
        .score { font-size: 4.5rem; font-weight: 900; line-height: 1; margin: 10px 0; }

        .analysis-text { font-size: 0.9rem; color: #ccc; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; border-left: 2px solid var(--accent); }

        /* Compare */
        .compare-controls { display: flex; gap: 12px; align-items: center; margin-top: 20px; }
        select { flex: 1; background: #0b0f19; color: white; border: 1px solid var(--border); padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-action { background: var(--accent); color: black; border: none; padding: 14px 28px; font-weight: 900; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        
        .compare-visual { display: flex; justify-content: space-around; align-items: center; margin-top: 25px; background: rgba(0,0,0,0.3); padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        .comp-player { text-align: center; width: 40%; }
        .comp-photo { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #333; margin-bottom: 12px; background: #1a1e2e; }
        .vs-divider { font-weight: 900; color: #444; font-size: 1.2rem; font-style: italic; }
    </style>
</head>
<body>

        <div class="logo">ACTION <span>ANALYTICS</span></div>
        <h1>NBA PLAYER <span>VALUE CALCULATOR</span></h1>

            Analyzing the gap between <strong>actual statistical production</strong> and <strong>market-driven expectations</strong> to find the league's most mispriced assets.

    <div class="panel">

        <div class="suggestion-grid" id="featured-grid"></div>
    </div>

    <div id="main-display" class="panel action-card"></div>

    <div class="panel">
        <h3 style="margin: 0; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; font-weight: 900;">HEAD-TO-HEAD VERDICT</h3>
        <div class="compare-controls">
            <select id="p1"></select>
            <span style="font-weight: 900; color: #444;">VS</span>
            <select id="p2"></select>
            <button class="btn-action" onclick="runComparison()">ANALYZE</button>

        <div id="compareResult"></div>

</div>

        {rank:423,name:"Paolo Banchero",performance:40.34,expectation:77.69,trueValue:-37.35,espnId:4432573},
        {rank:424,name:"Chet Holmgren",performance:26.67,expectation:80.04,trueValue:-53.38,espnId:4432815}
    ];

    const mainDisplay = document.getElementById("main-display");
    const featuredGrid = document.getElementById("featured-grid");
    const searchInput = document.getElementById("search");
    const p1Select = document.getElementById("p1");
    const p2Select = document.getElementById("p2");

    const SUGGESTED_NAMES = ["Nikola Jokić", "James Harden", "Victor Wembanyama", "LeBron James", "Chet Holmgren", "Shai Gilgeous-Alexander"];

    // FAILSAGE IMAGE LOGIC
    function getHeadshot(id) {
        // Amy: This ensures if ESPN blocks an ID, we show a clean silhouette instead of a broken icon
        return id ? `https://a.espncdn.com/i/headshots/nba/players/full/${id}.png` : 'https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png';
    }

    // AUTOMATED ANALYSIS GENERATOR (Addressing Ben's comment)
    function generateAnalysis(p) {
        const name = p.name.split(' ').pop();
        const isUnderrated = p.trueValue >= 0;
        
        if (isUnderrated) {
            if (p.expectation < 30) {
                return `Despite low market hype (Expectation: ${p.expectation.toFixed(1)}), ${name} is producing at a level that far exceeds his current narrative. He is one of the league's most overlooked high-efficiency assets.`;
            } else {
                return `Even with massive expectations, ${name} manages to blow past them. His production score of ${p.performance.toFixed(1)} confirms that he is actually *better* than the intense media coverage suggests.`;
            }
        } else {
            if (p.performance > 60) {
                return `While ${name} is playing at an elite level, his market perception and legacy expectations are so high that he technically grades as overrated. He isn't playing poorly; he's just a victim of his own unreachable hype.`;
            } else {
                return `The data suggests a significant disconnect here. With an Expectation score of ${p.expectation.toFixed(1)} but Production at ${p.performance.toFixed(1)}, ${name} is currently a high-cost asset with low-efficiency output.`;
            }
        }
    }

    function showPlayer(p) {
        const isUnder = p.trueValue >= 0;
        const color = isUnder ? 'var(--accent)' : 'var(--overrated)';
        mainDisplay.style.display = "block";
        mainDisplay.style.borderLeftColor = color;
        
        // Ben: Here is the visual value meter you requested
        mainDisplay.innerHTML = `
            <div class="card-header" style="background: ${isUnder ? 'linear-gradient(90deg, #1CFFC3, #13B89A)' : 'linear-gradient(90deg, #ff4d4d, #a30000)'}">
                <img class="main-photo" src="${getHeadshot(p.espnId)}" onerror="this.src='https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png'">
            </div>
            <div class="card-body">
                <h2 style="margin: 5px 0 0 0; font-weight: 900; font-size: 2rem;">${p.name.toUpperCase()}</h2>
                <div style="color: ${color}; font-weight: 900; font-size: 0.9rem; margin-bottom: 20px; letter-spacing: 1px;">${isUnder ? 'GENUINELY UNDERRATED' : 'STATISTICALLY OVERRATED'}</div>
                
                <div class="value-meter">
                    <div class="meter-row">
                        <span class="meter-label">STATISTICAL PRODUCTION</span>
                        <div class="bar-container">
                            <div class="bar-fill" style="width: ${p.performance}%; background: var(--accent);"></div>
                        </div>
                    </div>
                    <div class="meter-row">
                        <span class="meter-label">MARKET EXPECTATION (HYPE/SALARY)</span>
                        <div class="bar-container">
                            <div class="bar-fill" style="width: ${p.expectation}%; background: ${color}; opacity: 0.6;"></div>
                        </div>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="stat"><small>INDEX RANK</small><div>#${p.rank}</div></div>
                    <div class="stat"><small>VALUE GAP</small><div style="color: ${color}">${p.trueValue.toFixed(2)}</div></div>
                </div>
                
                <div class="analysis-text" style="border-left-color: ${color}">
                    <strong>THE VERDICT:</strong> ${generateAnalysis(p)}
                </div>
            </div>
        `;
        mainDisplay.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderSuggestions(list) {
        featuredGrid.innerHTML = "";
        list.forEach(p => {
            const div = document.createElement("div");
            div.className = "mini-card";
            div.onclick = () => showPlayer(p);
            div.innerHTML = `
                <div class="mini-avatar"><img src="${getHeadshot(p.espnId)}" onerror="this.src='https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png'"></div>
                <div class="mini-name">${p.name}</div>
            `;
            featuredGrid.appendChild(div);
        });
    }

    function runComparison() {
        const a = players.find(p => p.name === p1Select.value);
        const b = players.find(p => p.name === p2Select.value);
        if(!a || !b) return;

        const winner = a.trueValue > b.trueValue ? a : b;
        
        document.getElementById("compareResult").innerHTML = `
            <div class="compare-visual">
                <div class="comp-player">
                    <img src="${getHeadshot(a.espnId)}" class="comp-photo" style="border-color: ${a.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">
                    <div style="font-size: 0.8rem; font-weight: 900; color: #ccc;">${a.name.toUpperCase()}</div>
                    <div style="font-weight: 900; font-size: 1.5rem; color: ${a.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">${a.trueValue.toFixed(2)}</div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="comp-player">
                    <img src="${getHeadshot(b.espnId)}" class="comp-photo" style="border-color: ${b.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">
                    <div style="font-size: 0.8rem; font-weight: 900; color: #ccc;">${b.name.toUpperCase()}</div>
                    <div style="font-weight: 900; font-size: 1.5rem; color: ${b.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">${b.trueValue.toFixed(2)}</div>
                </div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <div style="color: var(--accent); font-weight: 900; font-size: 1.2rem;">${winner.name.toUpperCase()} IS THE BETTER MARKET VALUE</div>
            </div>
        `;
    }

    searchInput.addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase().trim();
        if (!q) {
            renderSuggestions(players.filter(p => SUGGESTED_NAMES.includes(p.name)));
            return;
        }
        const matches = players.filter(p => p.name.toLowerCase().includes(q)).slice(0, 8);
        renderSuggestions(matches);
    });

    window.onload = () => {
        const featured = players.filter(p => SUGGESTED_NAMES.includes(p.name));
        renderSuggestions(featured);
        const sorted = [...players].sort((a,b) => a.name.localeCompare(b.name));
        sorted.forEach(p => {
            p1Select.add(new Option(p.name, p.name));
            p2Select.add(new Option(p.name, p.name));
        });
        p1Select.value = "James Harden";
        p2Select.value = "LeBron James";
    };
</script>
