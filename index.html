<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Value Index | Action Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS STYLES */
        :root {
            --bg: #05060c;
            --panel: #11141d;
            --accent: #42f5c5;
            --text: #e9f4f1;
            --border: rgba(255,255,255,0.1);
            --overrated: #ff4d4d;
        }

        body {
            background: radial-gradient(circle at top right, #103f3a, transparent), var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .wrapper { max-width: 900px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; }
        .logo { font-weight: 900; letter-spacing: 2px; color: #666; margin-bottom: 5px; }
        .logo span { color: var(--accent); }
        h1 { font-size: 2.5rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        h1 span { color: var(--accent); }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: #05060c;
            border: 1px solid var(--border);
            padding: 15px;
            color: white;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .suggestion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .mini-card {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .mini-card:hover { border-color: var(--accent); background: rgba(66, 245, 197, 0.1); }
        .mini-avatar img { width: 50px; height: 50px; border-radius: 50%; background: #222; }
        .mini-name { font-size: 0.8rem; font-weight: bold; margin-top: 5px; }

        /* Main Player Card */
        #main-display { display: none; margin-bottom: 30px; }
        .action-card { overflow: hidden; position: relative; }
        .card-header { height: 80px; position: relative; margin-bottom: 60px; border-radius: 12px 12px 0 0; }
        .main-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid var(--panel);
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
        }
        .card-body { text-align: center; padding-bottom: 20px; }
        .stats-row { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat small { display: block; color: #888; font-size: 0.7rem; letter-spacing: 1px; }
        .stat div { font-size: 1.4rem; font-weight: 900; }
        .score { font-size: 4rem; font-weight: 900; line-height: 1; }

        /* Comparison Section */
        .compare-controls { display: flex; gap: 10px; align-items: center; margin-top: 15px; }
        select { flex: 1; background: #05060c; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 6px; }
        .btn-action { background: var(--accent); color: black; border: none; padding: 12px 20px; font-weight: 900; border-radius: 6px; cursor: pointer; }
        
        .compare-visual { display: flex; justify-content: space-around; align-items: center; margin-top: 20px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; }
        .comp-player { text-align: center; }
        .comp-photo { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #333; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="logo">ACTION <span>ANALYTICS</span></div>
        <h1>NBA VALUE <span>INDEX</span></h1>
    </header>

    <div class="panel">
        <input type="text" id="search" placeholder="Search Player (e.g. LeBron)...">
        <div id="suggestion-label" style="font-size: 0.7rem; color: #888; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px;">FEATURED PLAYERS</div>
        <div class="suggestion-grid" id="featured-grid"></div>
    </div>

    <div id="main-display" class="panel action-card">
        </div>

    <div class="panel">
        <h3 style="margin-top: 0; font-size: 0.9rem; color: var(--accent);">HEAD-TO-HEAD COMPARISON</h3>
        <div class="compare-controls">
            <select id="p1"></select>
            <span style="font-weight: 900; color: #444;">VS</span>
            <select id="p2"></select>
            <button class="btn-action" onclick="runComparison()">ANALYZE</button>
        </div>
        <div id="compareResult"></div>
    </div>
</div>

<script>
    // DATA
    const players = [
        {rank:1,name:"Nikola Jokić",performance:100,expectation:47.42,trueValue:52.58,espnId:3112335},
        {rank:2,name:"Nikola Vučević",performance:47.78,expectation:11.07,trueValue:36.71,espnId:6478},
        {rank:12,name:"Giannis Antetokounmpo",performance:84.38,expectation:60.38,trueValue:23.99,espnId:3032977},
        {rank:38,name:"Victor Wembanyama",performance:46.64,expectation:30.60,trueValue:16.04,espnId:5104157},
        {rank:305,name:"Shai Gilgeous-Alexander",performance:94.95,expectation:100,trueValue:-5.05,espnId:4277811},
        {rank:351,name:"Luka Dončić",performance:52.17,expectation:62.90,trueValue:-10.74,espnId:3945274},
        {rank:391,name:"Jayson Tatum",performance:72.21,expectation:88.92,trueValue:-16.71,espnId:4065648},
        {rank:415,name:"LeBron James",performance:70.22,expectation:99.33,trueValue:-29.11,espnId:1966},
        {rank:424,name:"Chet Holmgren",performance:26.67,expectation:80.04,trueValue:-53.38,espnId:4432815}
        // ... (You can paste the rest of your player data here)
    ];

    const featuredGrid = document.getElementById("featured-grid");
    const search = document.getElementById("search");
    const mainDisplay = document.getElementById("main-display");
    const p1Select = document.getElementById("p1");
    const p2Select = document.getElementById("p2");

    // HELPERS
    function getHeadshot(id) {
        return id ? `https://a.espncdn.com/i/headshots/nba/players/full/${id}.png` : 'https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png';
    }

    function showPlayer(p) {
        const isUnder = p.trueValue >= 0;
        const color = isUnder ? 'var(--accent)' : 'var(--overrated)';
        mainDisplay.style.display = "block";
        mainDisplay.innerHTML = `
            <div class="card-header" style="background: ${isUnder ? 'linear-gradient(90deg, #1CFFC3, #13B89A)' : 'linear-gradient(90deg, #ff4d4d, #a30000)'}">
                <img class="main-photo" src="${getHeadshot(p.espnId)}">
            </div>
            <div class="card-body">
                <div style="font-size: 0.7rem; font-weight: bold; color: #888;">RANK #${p.rank}</div>
                <h2 style="margin: 5px 0 0 0; font-weight: 900;">${p.name.toUpperCase()}</h2>
                <div style="color: ${color}; font-weight: bold; font-size: 0.8rem; margin-bottom: 15px;">${isUnder ? 'UNDERRATED' : 'OVERRATED'}</div>
                <div class="stats-row">
                    <div class="stat"><small>PERFORMANCE</small><div>${p.performance}</div></div>
                    <div class="stat"><small>EXPECTATION</small><div>${p.expectation}</div></div>
                </div>
                <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                    <small style="color: #888; font-weight: bold;">VALUE GAP SCORE</small>
                    <div class="score" style="color: ${color}">${p.trueValue.toFixed(2)}</div>
                </div>
            </div>
        `;
        mainDisplay.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderSuggestions(list) {
        featuredGrid.innerHTML = "";
        list.forEach(p => {
            const div = document.createElement("div");
            div.className = "mini-card";
            div.onclick = () => showPlayer(p);
            div.innerHTML = `
                <div class="mini-avatar"><img src="${getHeadshot(p.espnId)}"></div>
                <div class="mini-name">${p.name}</div>
            `;
            featuredGrid.appendChild(div);
        });
    }

    function runComparison() {
        const a = players.find(p => p.name === p1Select.value);
        const b = players.find(p => p.name === p2Select.value);
        const winner = a.trueValue > b.trueValue ? a : b;
        
        document.getElementById("compareResult").innerHTML = `
            <div class="compare-visual">
                <div class="comp-player">
                    <img src="${getHeadshot(a.espnId)}" class="comp-photo" style="border-color: ${a.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">
                    <div style="font-size: 0.8rem; font-weight: bold;">${a.name}</div>
                    <div style="font-weight: 900; color: ${a.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">${a.trueValue.toFixed(2)}</div>
                </div>
                <div style="font-weight: 900; color: #444;">VS</div>
                <div class="comp-player">
                    <img src="${getHeadshot(b.espnId)}" class="comp-photo" style="border-color: ${b.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">
                    <div style="font-size: 0.8rem; font-weight: bold;">${b.name}</div>
                    <div style="font-weight: 900; color: ${b.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">${b.trueValue.toFixed(2)}</div>
                </div>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <div style="font-size: 0.6rem; color: #888; font-weight: bold; letter-spacing: 1px;">BETTER VALUE</div>
                <div style="color: var(--accent); font-weight: 900;">${winner.name.toUpperCase()}</div>
            </div>
        `;
    }

    // SEARCH INITIALIZATION
    search.addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase();
        if (!q) {
            renderSuggestions(players.slice(0, 6));
            return;
        }
        const matches = players.filter(p => p.name.toLowerCase().includes(q)).slice(0, 6);
        renderSuggestions(matches);
    });

    // INIT
    window.onload = () => {
        renderSuggestions(players.slice(0, 6));
        const sorted = [...players].sort((a,b) => a.name.localeCompare(b.name));
        sorted.forEach(p => {
            p1Select.add(new Option(p.name, p.name));
            p2Select.add(new Option(p.name, p.name));
        });
        p1Select.value = "Nikola Jokić";
        p2Select.value = "LeBron James";
    };
</script>

</body>
</html>
