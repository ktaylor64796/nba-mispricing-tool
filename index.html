<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NBA Value Analytics | Action Network Style</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrapper">
    <header>
        <div class="logo">ACTION <span>ANALYTICS</span></div>
        <h1>NBA OVER/UNDERRATED <span>INDEX</span></h1>
        <p class="sub">Performance vs. Market Expectation. Who is truly driving value?</p>
    </header>

    <div class="main-grid">
        <section class="search-section">
            <div class="panel">
                <input id="search" placeholder="🔍 Search for a player (e.g. Jokic)..." />
                <div id="suggestions-label">Featured Players</div>
                <div id="featured-grid" class="player-grid"></div>
            </div>
        </section>

        <section class="display-section">
            <div id="card" class="action-card">
                <div class="empty-state">Search or select a player to view analytics</div>
            </div>
            <button class="btn-share" onclick="downloadCard()">DOWNLOAD SHARE CARD</button>
        </section>
    </div>

    <section class="compare-section panel">
        <h3>HEAD-TO-HEAD COMPARISON</h3>
        <div class="compare-controls">
            <select id="p1"></select>
            <div class="vs-circle">VS</div>
            <select id="p2"></select>
            <button class="btn-action" onclick="compare()">RUN ANALYSIS</button>
        </div>
        <div id="compareResult"></div>
    </section>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
