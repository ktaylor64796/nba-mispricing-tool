<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Value Index | Action Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060c;
            --panel: #11141d;
            --accent: #42f5c5; /* Action Green */
            --accent-dim: #13B89A;
            --text: #e9f4f1;
            --border: rgba(255,255,255,0.1);
            --overrated: #ff4d4d;
            --overrated-dim: #a30000;
        }

        body {
            background: radial-gradient(circle at top right, #103f3a, transparent), var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
            min-height: 100vh;
        }

        .wrapper { max-width: 900px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; }
        .logo { font-weight: 900; letter-spacing: 2px; color: #666; margin-bottom: 5px; }
        .logo span { color: var(--accent); }
        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -1px; }
        h1 span { color: var(--accent); }

        .mission-statement {
            color: #888;
            font-size: 1rem;
            max-width: 750px;
            margin: 15px auto 0;
            font-weight: 400;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: #0b0f19;
            border: 1px solid var(--border);
            padding: 16px;
            color: white;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(66, 245, 197, 0.2); }

        .suggestion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .mini-card {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .mini-card:hover { border-color: var(--accent); background: rgba(66, 245, 197, 0.05); transform: translateY(-3px); }
        
        .mini-avatar { width: 60px; height: 60px; margin: 0 auto; overflow: hidden; border-radius: 50%; background: #222; }
        .mini-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .mini-name { font-size: 0.8rem; font-weight: 700; margin-top: 8px; color: #ccc; }

        /* Main Display Card */
        #main-display { display: none; }
        .action-card { overflow: hidden; position: relative; }
        .card-header { height: 100px; position: relative; margin-bottom: 60px; border-radius: 12px; }
        
        .photo-container {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 6px solid var(--panel);
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1e2e;
            overflow: hidden;
        }
        .main-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .card-body { text-align: center; padding: 0 10px 20px; }
        
        .value-meter { margin: 25px 0; background: rgba(0,0,0,0.25); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .meter-row { margin-bottom: 15px; text-align: left; }
        .meter-label { font-size: 0.65rem; font-weight: 900; color: #aaa; letter-spacing: 1.2px; margin-bottom: 6px; display: block; }
        .bar-container { background: #000; height: 12px; border-radius: 6px; width: 100%; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease-out; }
        
        .stats-row { display: flex; justify-content: center; gap: 40px; margin: 25px 0; border-top: 1px solid var(--border); padding-top: 20px; }
        .stat small { display: block; color: #666; font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; }
        .stat div { font-size: 1.8rem; font-weight: 900; }
        .score { font-size: 4.5rem; font-weight: 900; line-height: 1; margin: 10px 0; }

        .analysis-text { font-size: 1rem; color: #ccc; background: rgba(255,255,255,0.04); padding: 25px; border-radius: 12px; margin-top: 20px; text-align: left; border-left: 4px solid var(--accent); font-style: italic; }

        /* Compare Controls */
        .compare-controls { display: flex; gap: 12px; align-items: center; margin-top: 20px; }
        select { flex: 1; background: #0b0f19; color: white; border: 1px solid var(--border); padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-action { background: var(--accent); color: black; border: none; padding: 14px 28px; font-weight: 900; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        
        .compare-visual { display: flex; justify-content: space-around; align-items: center; margin-top: 25px; background: rgba(0,0,0,0.3); padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        .comp-player { text-align: center; width: 40%; }
        .comp-photo-circle { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #333; margin-bottom: 12px; background: #1a1e2e; overflow: hidden; display: inline-block; }
        .comp-photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .vs-divider { font-weight: 900; color: #444; font-size: 1.2rem; font-style: italic; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="logo">ACTION <span>ANALYTICS</span></div>
        <h1>NBA PLAYER <span>VALUE CALCULATOR</span></h1>
        <p class="mission-statement">
            Comparing <strong>On-Court Production</strong> (Advanced impact & raw volume) vs. <strong>Market Expectation</strong> (Salary, search interest, and legacy hype).
        </p>
    </header>

    <div class="panel">
        <input type="text" id="search" placeholder="Search 400+ players...">
        <div id="suggestion-label" style="font-size: 0.7rem; color: #555; margin-bottom: 12px; font-weight: 900; letter-spacing: 2px;">SUGGESTED ANALYTICS</div>
        <div class="suggestion-grid" id="featured-grid"></div>
    </div>

    <div id="main-display" class="panel action-card"></div>

    <div class="panel">
        <h3 style="margin: 0; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; font-weight: 900;">HEAD-TO-HEAD VERDICT</h3>
        <div class="compare-controls">
            <select id="p1"></select>
            <span style="font-weight: 900; color: #444;">VS</span>
            <select id="p2"></select>
            <button class="btn-action" onclick="runComparison()">ANALYZE</button>
        </div>
        <div id="compareResult"></div>
    </div>
</div>

<script>
    // THE MASTER 424 DATASET (Simplified for code block, ensure your full array is here)
    const players = [
        {rank:1,name:"Nikola Jokić",performance:100.00,expectation:47.42,trueValue:52.58,espnId:3112335},
        {rank:2,name:"Nikola Vučević",performance:47.78,expectation:11.07,trueValue:36.71,espnId:6478},
        {rank:3,name:"Jalen Duren",performance:46.41,expectation:11.37,trueValue:35.04,espnId:4432816},
        {rank:4,name:"James Harden",performance:67.64,expectation:36.71,trueValue:30.94,espnId:3992},
        {rank:7,name:"Tyler Herro",performance:55.06,expectation:25.93,trueValue:29.13,espnId:4395627},
        {rank:8,name:"Amen Thompson",performance:49.03,expectation:21.65,trueValue:27.38,espnId:4432166},
        {rank:38,name:"Victor Wembanyama",performance:46.64,expectation:30.60,trueValue:16.04,espnId:5104157},
        {rank:305,name:"Shai Gilgeous-Alexander",performance:94.95,expectation:100.00,trueValue:-5.05,espnId:4277811},
        {rank:391,name:"Jayson Tatum",performance:72.21,expectation:88.92,trueValue:-16.71,espnId:4065648},
        {rank:415,name:"LeBron James",performance:70.22,expectation:99.33,trueValue:-29.11,espnId:1966},
        {rank:424,name:"Chet Holmgren",performance:26.67,expectation:80.04,trueValue:-53.38,espnId:4432815}
        // ... (Paste all other 413 players here)
    ];

    const mainDisplay = document.getElementById("main-display");
    const featuredGrid = document.getElementById("featured-grid");
    const searchInput = document.getElementById("search");
    const p1Select = document.getElementById("p1");
    const p2Select = document.getElementById("p2");

    const SUGGESTED_NAMES = ["Nikola Jokić", "James Harden", "Victor Wembanyama", "LeBron James", "Chet Holmgren", "Shai Gilgeous-Alexander"];

    function getHeadshot(id) {
        if (!id) return 'https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png&w=200&h=150';
        return `https://a.espncdn.com/i/headshots/nba/players/full/${id}.png`;
    }

    // PULLING IN RAW DATA NARRATIVES (Amy's & Ben's feedback)
    function generateAnalysis(p) {
        const name = p.name.split(' ').pop();
        const isUnderrated = p.trueValue >= 0;
        
        if (p.performance >= 90 && isUnderrated) {
            return `<strong>${name}</strong> is a statistical anomaly. Despite carrying an elite MVP baseline, his box score production is so massive (Score: ${p.performance.toFixed(0)}) that he literally breaks the model. He provides the league's highest ROI because his production has reached a ceiling that market hype cannot catch up to.`;
        }
        if (p.expectation > 90 && !isUnderrated) {
            return `This is a classic 'Legacy Trap.' <strong>${name}</strong> is still playing at an All-Star level, but he is being measured against a near-perfect Expectation Score of ${p.expectation.toFixed(0)} driven by global search volume and a veteran max-contract. He isn't playing poorly; he's just a victim of unreachable standards.`;
        }
        if (p.expectation > 75 && p.performance < 30) {
            return `The model identifies a significant 'Hype Overhang' here. While <strong>${name}</strong> has a massive media footprint (Expectation: ${p.expectation.toFixed(0)}), his current raw volume and efficiency (Production: ${p.performance.toFixed(0)}) haven't caught up to his market narrative.`;
        }
        if (p.expectation < 20 && p.performance > 45) {
            return `<strong>${name}</strong> is a 'Quiet Workhorse.' He delivers elite-level efficiency and volume, yet his search interest and social footprint are nearly zero (Expectation: ${p.expectation.toFixed(0)}). This lack of hype creates a top-tier positive value gap.`;
        }
        if (isUnderrated) {
            return `${name} currently provides a value gap of <strong>+${p.trueValue.toFixed(1)}</strong>. He is outperforming his market narrative, suggesting his statistical production is deeper than his current paycheck and public popularity would suggest.`;
        } else {
            return `${name} carries a negative value gap of <strong>${p.trueValue.toFixed(1)}</strong>. This suggests his combined salary and public hype are currently pacing ahead of his measured on-court efficiency.`;
        }
    }

    function showPlayer(p) {
        const isUnder = p.trueValue >= 0;
        const mainColor = isUnder ? 'var(--accent)' : 'var(--overrated)';
        const dimColor = isUnder ? 'var(--accent-dim)' : 'var(--overrated-dim)';
        
        mainDisplay.style.display = "block";
        mainDisplay.style.borderLeftColor = mainColor;
        
        mainDisplay.innerHTML = `
            <div class="card-header" style="background: ${isUnder ? 'linear-gradient(90deg, #1CFFC3, #13B89A)' : 'linear-gradient(90deg, #ff4d4d, #a30000)'}">
                <div class="photo-container">
                    <img class="main-photo" src="${getHeadshot(p.espnId)}" onerror="this.src='https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png&w=200&h=150'">
                </div>
            </div>
            <div class="card-body">
                <h2 style="margin: 0; font-weight: 900; font-size: 2.2rem;">${p.name.toUpperCase()}</h2>
                <div style="font-size: 0.8rem; font-weight: 900; color: #555; letter-spacing: 2px; margin-bottom: 20px;">RANKED #${p.rank} OVERALL</div>
                
                <div class="value-meter">
                    <div class="meter-row">
                        <span class="meter-label">PRODUCTION (ACTUAL ON-COURT PERFORMANCE)</span>
                        <div class="bar-container"><div class="bar-fill" style="width: ${p.performance}%; background: ${mainColor};"></div></div>
                    </div>
                    <div class="meter-row">
                        <span class="meter-label">EXPECTATION (HYPE, SEARCH VOLUME & SALARY)</span>
                        <div class="bar-container"><div class="bar-fill" style="width: ${p.expectation}%; background: ${dimColor}; opacity: 0.8;"></div></div>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="stat"><small>INDEX STATUS</small><div style="color: ${mainColor}; font-size: 1rem;">${isUnder ? 'UNDERRATED' : 'OVERRATED'}</div></div>
                    <div class="stat"><small>THE VALUE GAP</small><div style="color: ${mainColor}">${p.trueValue.toFixed(2)}</div></div>
                </div>
                
                <div class="analysis-text" style="border-left-color: ${mainColor}">
                    <span style="color: ${mainColor}; font-weight: 900; font-size: 0.7rem; display: block; margin-bottom: 8px; letter-spacing: 1px;">EXPERT VERDICT</span>
                    ${generateAnalysis(p)}
                </div>
            </div>
        `;
        mainDisplay.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderSuggestions(list) {
        featuredGrid.innerHTML = "";
        list.forEach(p => {
            const div = document.createElement("div");
            div.className = "mini-card";
            div.onclick = () => showPlayer(p);
            div.innerHTML = `
                <div class="mini-avatar"><img src="${getHeadshot(p.espnId)}" onerror="this.src='https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png&w=100&h=75'"></div>
                <div class="mini-name">${p.name}</div>
            `;
            featuredGrid.appendChild(div);
        });
    }

    function runComparison() {
        const a = players.find(p => p.name === p1Select.value);
        const b = players.find(p => p.name === p2Select.value);
        if(!a || !b) return;
        const winner = a.trueValue > b.trueValue ? a : b;
        document.getElementById("compareResult").innerHTML = `
            <div class="compare-visual">
                <div class="comp-player">
                    <div class="comp-photo-circle" style="border-color: ${a.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">
                        <img src="${getHeadshot(a.espnId)}" onerror="this.src='https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png&w=100&h=75'">
                    </div>
                    <div style="font-size: 0.8rem; font-weight: 900; color: #ccc;">${a.name.toUpperCase()}</div>
                    <div style="font-weight: 900; font-size: 1.5rem; color: ${a.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">${a.trueValue.toFixed(2)}</div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="comp-player">
                    <div class="comp-photo-circle" style="border-color: ${b.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">
                        <img src="${getHeadshot(b.espnId)}" onerror="this.src='https://a.espncdn.com/combiner/i?img=/i/headshots/noplayer.png&w=100&h=75'">
                    </div>
                    <div style="font-size: 0.8rem; font-weight: 900; color: #ccc;">${b.name.toUpperCase()}</div>
                    <div style="font-weight: 900; font-size: 1.5rem; color: ${b.trueValue >= 0 ? 'var(--accent)' : 'var(--overrated)'}">${b.trueValue.toFixed(2)}</div>
                </div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <div style="color: var(--accent); font-weight: 900; font-size: 1.2rem;">${winner.name.toUpperCase()} IS THE BETTER MARKET VALUE</div>
            </div>
        `;
    }

    searchInput.addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase().trim();
        if (!q) {
            renderSuggestions(players.filter(p => SUGGESTED_NAMES.includes(p.name)));
            return;
        }
        const matches = players.filter(p => p.name.toLowerCase().includes(q)).slice(0, 8);
        renderSuggestions(matches);
    });

    window.onload = () => {
        renderSuggestions(players.filter(p => SUGGESTED_NAMES.includes(p.name)));
        const sorted = [...players].sort((a,b) => a.name.localeCompare(b.name));
        sorted.forEach(p => {
            p1Select.add(new Option(p.name, p.name));
            p2Select.add(new Option(p.name, p.name));
        });
        p1Select.value = "James Harden";
        p2Select.value = "LeBron James";
    };
</script>
</body>
</html>
